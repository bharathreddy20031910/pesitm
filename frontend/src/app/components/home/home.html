<section class="home-container">
  <h2>Current Students</h2>
  <div class="cards">
    <article class="student-card" *ngFor="let user of users">
      <div class="student-header">
        <h3>{{ user.name }}</h3>
        <span>Age {{ user.age }}</span>
      </div>
      <p><strong>Email:</strong> {{ user.email }}</p>
      <div class="actions">
        <button (click)="deleteUser(user._id)">Delete</button>
        <button routerLink="/edit-user/{{ user._id }}">Edit</button>
      </div>
    </article>
  </div>

  <button class="add-btn" routerLink="/create-user">Create New Student</button>
</section>
